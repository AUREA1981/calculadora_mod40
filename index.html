<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Pensiones IMSS</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ═══════════════════════════════════════════════
     HEADER
     ═══════════════════════════════════════════════ -->
<header>
  <div class="brand">
    <img src="logo-aurea.jpeg" alt="Áurea Asesoría Integral" class="brand-logo">
    <div class="brand-text">
      <span class="brand-title">Áurea</span>
      <span class="brand-subtitle">Calculadora de Pensiones IMSS</span>
    </div>
  </div>
  <div class="nav-btns" style="display:none;">
    <button class="btn-menu-movil" onclick="toggleMenuMovil()">☰</button>

    <!-- Menú desplegable desde el nombre — igual en cualquier tamaño de pantalla -->
    <div class="user-menu">
      <button class="user-menu-toggle" onclick="toggleUserMenu()">
        <span id="usuarioNombreMobile"></span><span class="chevron">▾</span>
      </button>
      <div class="user-menu-dropdown" id="userMenuDropdown">
        <button onclick="renderInicio(); cerrarUserMenu()">🏠 Inicio</button>
        <button onclick="mostrarVista('lista'); cerrarUserMenu()">📋 Clientes</button>
        <button onclick="mostrarVista('form'); modoNuevo(); cerrarUserMenu()">➕ Nuevo cliente</button>
        <button id="btnUsuariosMobile" style="display:none;" onclick="renderUsuarios(); cerrarUserMenu()">👥 Usuarios</button>
        <button onclick="abrirCambiarPassword(); cerrarUserMenu()">🔑 Cambiar contraseña</button>
        <button onclick="cerrarSesion()">🚪 Cerrar sesión</button>
      </div>
    </div>
  </div>
</header>

<!-- ═══════════════════════════════════════════════
     LOGIN
     ═══════════════════════════════════════════════ -->
<div id="loginOverlay" style="display:flex; flex:1; align-items:center; justify-content:center; padding:2rem 1rem;">
  <div style="background:#1E1E1E; border:1px solid #2A2A2A; border-radius:12px; padding:2rem; max-width:340px; width:100%;">
    <h3 style="color:#C9A84C; margin-bottom:1.25rem; text-align:center;">Iniciar sesión</h3>
    <div style="display:flex; flex-direction:column; gap:.85rem;">
      <div>
        <label style="font-size:.8rem; color:#9A9A9A;">Correo</label>
        <input type="email" id="loginEmail" placeholder="tu@correo.com" style="width:100%; padding:.6rem; border-radius:6px; border:1px solid #2A2A2A; background:#141414; color:#fff;">
      </div>
      <div>
        <label style="font-size:.8rem; color:#9A9A9A;">Contraseña</label>
        <input type="password" id="loginPass" placeholder="••••••••" style="width:100%; padding:.6rem; border-radius:6px; border:1px solid #2A2A2A; background:#141414; color:#fff;">
      </div>
      <button onclick="iniciarSesion()" style="background:#C9A84C; color:#0D0D0D; font-weight:600; padding:.65rem; border-radius:6px; border:none; cursor:pointer; margin-top:.5rem;">Entrar</button>
      <div id="loginError" style="color:#e05252; font-size:.8rem; text-align:center; min-height:1.2em;"></div>
      <div id="loginRecuperado" style="color:#6c6; font-size:.8rem; text-align:center; min-height:1.2em;"></div>
      <button onclick="recuperarPassword()" style="background:none; border:none; color:#9A9A9A; font-size:.8rem; text-decoration:underline; cursor:pointer; font-family:inherit; padding:0;">¿Olvidaste tu contraseña?</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════
     LAYOUT PRINCIPAL
     ═══════════════════════════════════════════════ -->
<div class="app" style="display:none;">

  <!-- Sidebar con lista de clientes -->
  <aside>
    <div class="aside-header">
      <span>Clientes</span>
      <button class="btn-nuevo" onclick="mostrarVista('form'); modoNuevo()">+ Nuevo</button>
    </div>
    <div class="search-box">
      <input type="text" id="busqueda" placeholder="Buscar…" oninput="renderLista()">
    </div>
    <div id="listaClientes"></div>
  </aside>

  <!-- Área principal (contenido dinámico) -->
  <main id="main">
    <!-- El contenido se inyecta aquí desde script.js -->
  </main>

</div>

  <!-- ═══════════════════════════════════════════════
      PIE DE PÁGINA
      ═══════════════════════════════════════════════ -->
  <footer class="site-footer no-print">
    <div>© 2026 Áurea Asesoría Integral · Todos los derechos reservados</div>
    <div>Puebla, México</div>
  </footer>

  <!-- ═══════════════════════════════════════════════
      TOAST (notificaciones)
      ═══════════════════════════════════════════════ -->
  <div class="toast" id="toast"></div>

  
<!-- ═══════════════════════════════════════════════
     MODAL — confirmar eliminar
     ═══════════════════════════════════════════════ -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h3>⚠️ Eliminar cliente</h3>
    <p id="modalMsg">Esta acción no se puede deshacer.</p>
    <div class="modal-btns">
      <button class="btn-confirm-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-confirm-del"    onclick="confirmarEliminar()">Sí, eliminar</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════
     MODAL — cambiar contraseña
     ═══════════════════════════════════════════════ -->
<div class="overlay" id="overlayPassword">
  <div class="modal" style="text-align:left;">
    <h3 style="text-align:center;">🔑 Cambiar contraseña</h3>
    <div style="display:flex; flex-direction:column; gap:.75rem; margin-top:1rem;">
      <div>
        <label style="font-size:.8rem; color:#9A9A9A;">Contraseña actual</label>
        <input type="password" id="pwActual" style="width:100%; padding:.55rem; border-radius:6px; border:1px solid #2A2A2A; background:#141414; color:#fff;">
      </div>
      <div>
        <label style="font-size:.8rem; color:#9A9A9A;">Contraseña nueva</label>
        <input type="password" id="pwNueva" style="width:100%; padding:.55rem; border-radius:6px; border:1px solid #2A2A2A; background:#141414; color:#fff;" placeholder="mínimo 6 caracteres">
      </div>
      <div id="pwError" style="color:#e05252; font-size:.8rem; min-height:1.1em;"></div>
    </div>
    <div class="modal-btns">
      <button class="btn-confirm-cancel" onclick="cerrarCambiarPassword()">Cancelar</button>
      <button class="btn-confirm-del" style="background:var(--dorado); color:#0D0D0D; border-color:var(--dorado);" onclick="guardarNuevaPassword()">Guardar</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════
     MODAL — aviso de inactividad
     ═══════════════════════════════════════════════ -->
<div class="overlay" id="overlayInactividad">
  <div class="modal">
    <h3>⏳ ¿Sigues ahí?</h3>
    <p>Tu sesión se cerrará en 1 minuto por inactividad.</p>
    <div class="modal-btns">
      <button class="btn-confirm-del" style="background:var(--dorado); color:#0D0D0D; border-color:var(--dorado);" onclick="seguirConectado()">Seguir conectado</button>
    </div>
  </div>
</div>

<!-- Script al final del body -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="script.js"></script>

</body>
</html>
